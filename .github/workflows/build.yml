name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # Read-only probe so a token missing the Workers scope is caught at PR
      # time, not on merge. Workers scripts list uses the same scope as deploy.
      - name: Verify Cloudflare token has Workers scope
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts")
          ok=$(printf '%s' "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("success"))')
          if [[ "$ok" != "True" ]]; then
            echo "::error::Cloudflare token lacks Workers scope (or the Workers API rejected the call). Re-mint the token with the 'Edit Cloudflare Workers' template."
            printf '%s\n' "$resp" | python3 -m json.tool || printf '%s\n' "$resp"
            exit 1
          fi
          echo "Workers API reachable with existing token ✓"

      - name: Deploy to R2
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          bash scripts/deploy.sh dist

      - name: Deploy Worker
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Smoke-test Worker
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Small grace period for edge propagation before probing production.
          sleep 5
          ./scripts/smoke-worker.sh
